<!doctype html>
<html lang="en">
<head>
  <link rel="icon" href="./assets/favicon.ico" sizes="any">
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>anguila ventures</title>
  <meta name="description" content="anguila ventures — Backing founders who swim against the current.">

  <style>
    :root{
            text-transform: lowercase;
      color-scheme: light;
      --bg1: #eef6ff;
      --bg2: #f7f8ff;
      --card: rgba(255,255,255,.72);
      --border: rgba(15,23,42,.12);
      --text: rgba(15,23,42,.92);
      --muted: rgba(15,23,42,.70);
      --faint: rgba(15,23,42,.68);
      --shadow: 0 18px 55px rgba(2,8,23,.12);
      --shadow2: 0 10px 26px rgba(2,8,23,.10);
      --accent1: rgba(2,132,199,.18);
      --accent2: rgba(168,85,247,.10);
      --ring: rgba(2,132,199,.28);
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      min-height:100vh;
      background:
        radial-gradient(1100px 700px at 18% 10%, var(--accent1), transparent 60%),
        radial-gradient(900px 650px at 82% 90%, var(--accent2), transparent 60%),
        linear-gradient(160deg, var(--bg1), var(--bg2));
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
      letter-spacing: .2px;
    }

    .wrap{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding: 56px 22px;
    }

    .card{
      width: min(920px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 18px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(12px);
      padding: 26px 26px 18px;
      transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
    }

.card:hover{
  box-shadow: 0 26px 80px rgba(2,8,23,.16);
}

    .top{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap: 16px;
      flex-wrap:wrap;
    }

    .brand{
      display:flex;
      align-items:center;
      gap: 12px;
      min-width: 280px;
    }

    /* Logo tile */
    .markBox{
      width: 64px;
      min-width: 64px;
      height: 64px;
      border-radius: 10px;
      border: 1px solid var(--border);
      box-shadow: var(--shadow2);
      overflow:hidden;
      position: relative;
      
      /* Fill the entire square */
      background-image: url("./assets/anguila-logo.png");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;

      /* Subtle smoothing perception */
      transform: translateZ(0);
      transition: transform .18s ease, box-shadow .18s ease;
    }

    .card:hover .markBox{
      box-shadow: 0 14px 32px rgba(2,8,23,.12);
    }

    /* Optional: a faint inner highlight for glass feel */
    .markBox::after{
      content:"";
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, rgba(255,255,255,.14), transparent 60%);
      pointer-events:none;
    }

    h1{
      margin:0;
      font-size: 16px;
      font-weight: 650;
      line-height: 1.1;
    }

    .sub{
      margin-top: 2px;
      font-size: 12px;
      color: var(--faint);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      display:flex;
      flex-wrap:wrap;
      gap: 6px;
      align-items:center;
    }

    .sub a{
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid rgba(15,23,42,.18);
      transition: border-color .15s ease, color .15s ease;
    }

    .sub a:hover{
      color: var(--text);
      border-color: rgba(15,23,42,.30);
    }

    .sep{ opacity:.55; }

    .actions{
      display:flex;
      align-items:center;
      gap: 10px;
    }

    .status{
      font-size: 12px;
      color: var(--faint);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.55);
      padding: 6px 10px;
      border-radius: 999px;
      user-select:none;
      text-transform: lowercase;
      white-space: nowrap;
    }

    .cta{
      font-size: 12px;
      color: var(--text);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.62);
      padding: 6px 10px;
      border-radius: 999px;
      text-transform: lowercase;
      text-decoration: none;
      display:inline-flex;
      align-items:center;
      font-weight: 650;
      gap: 8px;
      white-space: nowrap;
      transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease, background .15s ease;
      box-shadow: 0 0 0 rgba(2,8,23,0);
    }

    .cta:focus{
      outline: none;
      box-shadow: 0 0 0 4px var(--ring);
    }

    .cta:hover{
      transform: translateY(-1px);
      border-color: rgba(15,23,42,.16);
      background: rgba(255,255,255,.78);
      box-shadow: 0 14px 28px rgba(2,8,23,.10);
    }

    .cta:active{
      transform: translateY(0px);
      box-shadow: 0 10px 22px rgba(2,8,23,.08);
    }

    .cta .arrow{
      opacity: .8;
      transition: transform .15s ease, opacity .15s ease;
    }

    .cta:hover .arrow{
      transform: translateX(2px);
      opacity: 1;
    }

    .tagline{
      margin: 12px 0 0;
      font-size: 18px;
      line-height: 1.35;
      color: var(--muted);
      max-width: 62ch;
    }

    .tagline strong{ color: var(--text); font-weight: 750; }

    .meta{
      margin-top: 16px;
      display:flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .pill{
      font-size: 12px;
      color: var(--faint);
      border: 1px solid var(--border);
      background: rgba(255,255,255,.55);
      padding: 6px 10px;
      border-radius: 999px;
      text-transform: lowercase;
      transition: transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .pill:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.72);
      border-color: rgba(15,23,42,.14);
      cursor: default;
    }

    .divider{
      margin-top: 16px;
      height: 1px;
      background: rgba(15,23,42,.10);
    }

    footer{
      margin-top: 12px;
      display:flex;
      justify-content:space-between;
      gap: 12px;
      flex-wrap: wrap;
      font-size: 12px;
      color: var(--faint);
      text-transform: lowercase;
    }

    @media (max-width:520px){
      .card{ padding: 22px 20px 16px; }
      .tagline{ font-size: 16px; }
      .actions{ width:100%; justify-content:space-between; }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <main class="card">
      <div class="top">
        <div class="brand">
          <div class="markBox" aria-hidden="true"></div>

          <div>
            <h1>anguila ventures</h1>

            <div class="sub">
              <span><a href="https://www.linkedin.com/in/davidalcobero/" target="_blank" rel="noopener">David Alcobero</a></span>
              <span class="sep">·</span>
              <span>ex-cto &amp; cofounder @ vizlib (bootstrapped, exited)</span>
            </div>
          </div>
        </div>

        <div class="actions">
          <div class="status">🟢 active</div>
          <a
            class="cta"↳
            href="mailto:david@anguila.ventures?subject=Deck%20for%20anguila%20ventures&body=Hi%20David%2C%0A%0AQuick%20intro%3A%20%0A%0ADeck%20link%3A%20%0A%0AThanks%2C%0A"
            target="_blank" 
            aria-label="Send deck via email"
          >
            send deck <span class="arrow">↗</span>
          </a>
        </div>
      </div>

      <p class="tagline"><strong>Backing founders who swim against the current.</strong></p>

      <div class="meta" aria-label="focus">
        <span class="pill">🌱 early-stage</span>
        <span class="pill">✨ tech</span>
        <span class="pill">🤖 ai</span>
        <span class="pill">🤘 founder-friendly</span>
        <span class="pill"> 🛠️ operator-led</span>
        <span class="pill">🇪🇸 spain</span>
        <span class="pill">🇪🇺 eu</span>
      </div>

      <div class="divider" role="separator"></div>

      <footer>
        <span>📍 Barcelona · <span id="y">2026</span></span>
        <span>built to be quiet.</span>
      </footer>
    </main>
  </div>

  <script>
    document.getElementById("y").textContent = new Date().getFullYear();
  </script>
</body>
</html>
